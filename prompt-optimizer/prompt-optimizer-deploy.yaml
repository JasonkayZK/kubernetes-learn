apiVersion: apps/v1
kind: Deployment
metadata:
  name: prompt-optimizer-deploy
  labels:
    app: prompt-optimizer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prompt-optimizer
  template:
    metadata:
      labels:
        app: prompt-optimizer
    spec:
      containers:
      - name: prompt-optimizer
        image: registry.cn-hangzhou.aliyuncs.com/jasonkay/prompt-optimizer
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: prompt-optimizer-service
  labels:
    app: prompt-optimizer
spec:
  type: NodePort
  selector:
    app: prompt-optimizer
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 31435
